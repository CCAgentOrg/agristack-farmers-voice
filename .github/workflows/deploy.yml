name: Deploy
on:
  push:
    branches: [master]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g bun
      - run: bun install
      - run: bun run build
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=agristack-farmers-voice
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
